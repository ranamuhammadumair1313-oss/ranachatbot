<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umair AI - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0b0b; }
        
        /* Dark Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Loading Spinner */
        .loader {
            border: 3px solid #333;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Message Animation */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-200 h-screen overflow-hidden flex flex-col">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="bg-[#1a1a1a] p-8 rounded-2xl shadow-2xl border border-gray-800 w-full max-w-md text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-900/20">
                <span class="text-3xl font-bold text-white">U</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Welcome to Umair AI</h2>
            <p class="text-gray-400 mb-6 text-sm">Please enter your access code to continue</p>
            <input type="password" id="loginPass" placeholder="Enter Password" class="w-full bg-[#0b0b0b] border border-gray-700 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 transition-all text-center tracking-widest">
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all">Login</button>
        </div>
    </div>

    <!-- Main UI (Hidden until login) -->
    <div id="mainApp" class="hidden flex h-full w-full">
        <!-- Sidebar -->
        <aside class="w-72 bg-[#0b0b0b] border-r border-gray-800 flex flex-col hidden md:flex">
            <div class="p-4">
                <button onclick="newChat()" class="w-full border border-gray-700 hover:bg-[#1a1a1a] py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all text-sm">
                    <span>+</span> New Chat
                </button>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto px-3 space-y-2 py-2"></div>
            <div class="p-4 border-t border-gray-800">
                <button onclick="toggleSettings()" class="flex items-center gap-3 text-gray-400 hover:text-white transition-all text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Chat Main -->
        <main class="flex-1 flex flex-col bg-[#111111]">
            <header class="h-16 border-b border-gray-800 flex items-center justify-between px-6 bg-[#111111]/80 backdrop-blur-md">
                <h1 class="text-lg font-semibold tracking-tight text-blue-500">Umair AI</h1>
                <div id="headerStatus" class="text-xs text-gray-500">System Ready</div>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-6">
                <!-- Welcome -->
                <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center">
                    <h2 class="text-3xl font-bold mb-4">Kya hal hai, Sir?</h2>
                    <p class="text-gray-500 max-w-md italic">Aapka personal AI assistant tayyar hai. Kuch bhi poochein.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 lg:p-8 bg-gradient-to-t from-[#0b0b0b] to-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <div id="loading" class="absolute -top-10 left-1/2 -translate-x-1/2 hidden">
                        <div class="loader"></div>
                    </div>
                    <div class="bg-[#1a1a1a] border border-gray-700 rounded-2xl flex items-end p-2 shadow-2xl focus-within:border-blue-500/50 transition-all">
                        <textarea id="userInput" rows="1" placeholder="Type your message..." class="flex-1 bg-transparent border-none outline-none p-3 resize-none text-gray-200"></textarea>
                        <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-all ml-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-[#1a1a1a] border border-gray-800 p-6 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Developer Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">OpenRouter API Key</label>
                    <input type="password" id="apiKey" class="w-full bg-[#0b0b0b] border border-gray-700 rounded-lg p-2 outline-none text-sm text-blue-400">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">AI Model ID</label>
                    <input type="text" id="modelId" placeholder="google/gemini-2.0-flash-001" class="w-full bg-[#0b0b0b] border border-gray-700 rounded-lg p-2 outline-none text-sm">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="toggleSettings()" class="text-gray-400 px-4 py-2 hover:bg-gray-800 rounded-lg">Close</button>
                <button onclick="saveSettings()" class="bg-blue-600 px-4 py-2 rounded-lg font-semibold">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const PASS = "121845";
        let chatHistory = JSON.parse(localStorage.getItem('umair_chat_history')) || [];
        let currentConfig = JSON.parse(localStorage.getItem('umair_config')) || { key: '', model: 'google/gemini-2.0-flash-001' };

        // 1. Login System
        function checkLogin() {
            const input = document.getElementById('loginPass').value;
            if(input === PASS) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                initApp();
            } else {
                alert("Galat Password, Sir!");
            }
        }

        function initApp() {
            document.getElementById('apiKey').value = currentConfig.key;
            document.getElementById('modelId').value = currentConfig.model;
            updateHistoryUI();
        }

        // 2. Chat Logic
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            if(!currentConfig.key) {
                alert("Sir, pehle settings mein API key dalein.");
                toggleSettings();
                return;
            }

            // UI Changes
            document.getElementById('welcomeScreen').style.display = 'none';
            appendMessage('user', text);
            input.value = '';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${currentConfig.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: currentConfig.model,
                        messages: [{role: "user", content: text}]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                document.getElementById('loading').style.display = 'none';
                await streamResponse(aiResponse);
                
                // Save Chat
                chatHistory.push({user: text, ai: aiResponse});
                localStorage.setItem('umair_chat_history', JSON.stringify(chatHistory));
                updateHistoryUI();

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                appendMessage('ai', "Sorry Sir, connection error aa raha hai.");
            }
        }

        // 3. Streaming Effect (Line by line)
        async function streamResponse(text) {
            const msgDiv = appendMessage('ai', "");
            const lines = text.split('\n');
            let currentText = "";
            
            for(let line of lines) {
                currentText += line + "\n";
                msgDiv.innerHTML = `<div class="bg-[#1a1a1a] p-4 rounded-2xl border border-gray-800 text-gray-300 leading-relaxed">${currentText.replace(/\n/g, '<br>')}</div>`;
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
                await new Promise(r => setTimeout(r, 100)); // Delay for effect
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in mb-4`;
            
            const content = role === 'user' 
                ? `<div class="bg-blue-600 p-3 rounded-2xl max-w-[80%] text-white shadow-lg">${text}</div>`
                : `<div class="bg-[#1a1a1a] p-4 rounded-2xl border border-gray-800 max-w-[85%] text-gray-300 leading-relaxed">${text}</div>`;
            
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.firstChild;
        }

        // 4. Utility Functions
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
        }

        function saveSettings() {
            currentConfig.key = document.getElementById('apiKey').value;
            currentConfig.model = document.getElementById('modelId').value || 'google/gemini-2.0-flash-001';
            localStorage.setItem('umair_config', JSON.stringify(currentConfig));
            toggleSettings();
            alert("Settings saved!");
        }

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = chatHistory.slice(-5).map(chat => `
                <div class="p-2 hover:bg-[#1a1a1a] rounded text-xs text-gray-500 truncate cursor-pointer">
                    ${chat.user}
                </div>
            `).join('');
        }

        function newChat() {
            document.getElementById('chatBox').innerHTML = '<div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center"><h2 class="text-3xl font-bold mb-4">Kya hal hai, Sir?</h2><p class="text-gray-500 max-w-md italic">Aapka personal AI assistant tayyar hai.</p></div>';
        }

        // Auto-resize textarea
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
